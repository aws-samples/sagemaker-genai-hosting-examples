name: GLM-5-FP8 on p5e (vanilla)
description: MoE 744B total, 40B active, FP8, DeepSeek Sparse Attention on 8xH200
version: '1.0'
pipeline: [deploy, benchmark, cleanup]
deployment:
  model:
    id: zai-org/GLM-5-FP8
    short_name: glm5-fp8
    trust_remote_code: false
  instance:
    type: ml.p5e.48xlarge
    count: 1
  container:
    type: vllm-dlc
    version: 0.17.0
    cuda: cu129
  vllm:
    tensor_parallel_size: 8
    dtype: auto
    max_model_len: 4096
    max_num_seqs: 64
    gpu_memory_utilization: 0.85
    enable_chunked_prefill: true
    extra_env:
      SM_VLLM_TOOL_CALL_PARSER: glm47
      SM_VLLM_REASONING_PARSER: glm45
      SM_VLLM_ENABLE_AUTO_TOOL_CHOICE: ''
  speculative_decoding:
    enabled: false
  prefix_caching:
    enabled: false
  endpoint:
    pattern: standard
    name_prefix: bench
    region: us-west-2
    role_arn: arn:aws:iam::ACCOUNT_ID:role/SageMakerBenchmarkRole
    health_check_timeout: 2400
benchmark:
  concurrency_levels:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  requests_per_level: 30
  warmup_requests: 3
  pause_between_levels_sec: 3
  streaming: true
  inference_params:
    max_tokens: 600
    temperature: 0.7
    extra_payload:
      stream_options:
        include_usage: true
  use_cases:
  - multiturn_chat
  - tool_calling
  - long_context
cost:
  instance_cost_per_hour: 80.0
