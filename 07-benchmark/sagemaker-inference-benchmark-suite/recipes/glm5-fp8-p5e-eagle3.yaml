name: GLM-5-FP8 on p5e with EAGLE3
description: 744B MoE (40B active) FP8 with EAGLE3 speculative decoding
version: '1.0'
pipeline:
- deploy
- benchmark
- cleanup
deployment:
  model:
    id: zai-org/GLM-5-FP8
    short_name: glm5-fp8
    trust_remote_code: false
  instance:
    type: ml.p5e.48xlarge
    count: 1
  container:
    type: vllm-dlc
    version: 0.17.0
    cuda: cu129
  vllm:
    tensor_parallel_size: 8
    dtype: bfloat16
    max_model_len: 8192
    max_num_seqs: 64
    gpu_memory_utilization: 0.9
    enable_chunked_prefill: true
    trust_remote_code: false
  prefix_caching:
    enabled: true
  endpoint:
    pattern: standard
    name_prefix: bench
    region: us-west-2
    role_arn: arn:aws:iam::ACCOUNT_ID:role/SageMakerBenchmarkRole
    health_check_timeout: 1800
  speculative_decoding:
    enabled: true
    method: eagle3
    model: RedHatAI/GLM-5-speculator.eagle3
benchmark:
  concurrency_levels:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  requests_per_level: 30
  warmup_requests: 3
  pause_between_levels_sec: 3
  streaming: true
  inference_params:
    max_tokens: 600
    temperature: 0.7
    extra_payload:
      stream_options:
        include_usage: true
  use_cases:
  - multiturn_chat
  - tool_calling
  - long_context
cost:
  instance_cost_per_hour: 80.0
